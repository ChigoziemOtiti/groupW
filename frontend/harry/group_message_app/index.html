<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <div id="auth-view" class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card auth-card p-5" style="width: 100%; max-width: 420px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold" id="auth-title" style="color: #4f46e5;">Login</h2>
                <p class="text-muted small">Welcome back to GroupW</p>
            </div>

            <form id="auth-form">
                <div class="mb-4">
                    <label class="form-label fw-semibold text-muted small">USERNAME</label>
                    <input type="text" id="username" class="form-control form-control-lg bg-light border-0" required
                        minlength="3">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold text-muted small">PASSWORD</label>
                    <input type="password" id="password" class="form-control form-control-lg bg-light border-0" required
                        minlength="6">
                </div>

                <div id="auth-error" class="alert alert-danger d-none py-2 text-center small fw-semibold"></div>

                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold" id="auth-btn"
                    style="background: #4f46e5; border: none;">Login</button>
            </form>

            <div class="text-center mt-4">
                <a href="#" id="toggle-auth" class="text-decoration-none text-muted small fw-medium">Don't have an
                    account? <span style="color: #4f46e5;">Register here</span></a>
            </div>
        </div>
    </div>

    <div id="chat-view" class="container d-none">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">

                <div class="chat-window">
                    <div class="chat-header">
                        <div class="d-flex align-items-center gap-2">
                            <div class="bg-white rounded-circle d-flex align-items-center justify-content-center"
                                style="width: 40px; height: 40px; color: #4f46e5; font-weight: bold; font-size: 1.2rem;">
                                W
                            </div>
                            <div>
                                <h4 class="m-0">GroupW Global</h4>
                                <small style="color: #c7d2fe;">Live Chat</small>
                            </div>
                        </div>
                        <button class="btn btn-light btn-sm fw-bold rounded-pill px-3" style="color: #4f46e5;"
                            onclick="logout()">Leave</button>
                    </div>

                    <div id="message-container">
                    </div>

                    <div class="chat-input-area">
                        <form id="chat-form" class="d-flex gap-3 align-items-center">
                            <input type="text" id="message-input" class="form-control flex-grow-1"
                                placeholder="Type your message..." required autocomplete="off">
                            <button type="submit" class="btn btn-primary shadow-sm">Send</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
